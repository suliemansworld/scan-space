<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Scan Space</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="app">
    <!-- Camera feed -->
    <video id="cam" playsinline autoplay muted></video>

    <!-- Three.js overlay canvas -->
    <canvas id="scene"></canvas>

    <!-- Permission / anchor overlay -->
    <div id="start-overlay">
      <div class="start-card">
        <h1>Scan Space</h1>
        <p>Measure cargo with your camera</p>
        <button id="start-btn">Start Scan</button>
        <p class="hint">Camera &amp; motion access required</p>
      </div>
    </div>

    <!-- Bottom controls -->
    <div id="controls">
      <div class="drag-row" data-axis="length">
        <span class="axis-label">L</span>
        <div class="drag-track">
          <div class="drag-fill drag-fill-left"></div>
          <div class="drag-fill drag-fill-right"></div>
          <div class="drag-thumb"></div>
        </div>
        <span class="axis-val">48</span>
        <span class="axis-unit">&Prime;</span>
      </div>
      <div class="drag-row" data-axis="width">
        <span class="axis-label">W</span>
        <div class="drag-track">
          <div class="drag-fill drag-fill-left"></div>
          <div class="drag-fill drag-fill-right"></div>
          <div class="drag-thumb"></div>
        </div>
        <span class="axis-val">36</span>
        <span class="axis-unit">&Prime;</span>
      </div>
      <div class="drag-row" data-axis="height">
        <span class="axis-label">H</span>
        <div class="drag-track">
          <div class="drag-fill drag-fill-left"></div>
          <div class="drag-fill drag-fill-right"></div>
          <div class="drag-thumb"></div>
        </div>
        <span class="axis-val">30</span>
        <span class="axis-unit">&Prime;</span>
      </div>
      <div id="volume-row">
        <span id="volume-val">30.0</span>
        <span id="volume-unit">ft&sup3;</span>
      </div>
    </div>

    <!-- Hint -->
    <div id="hint">Tap box to nudge +1&Prime; &middot; Hold to nudge &minus;1&Prime;</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
